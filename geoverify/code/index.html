<html>
  <head>
  <link rel="icon" type="image/png" href="images/minime.png">
  <title>GeoVerify Codes</title>
</head>
  <script>
  function copyCode() {
    const text = document.getElementById("code-container").innerText;
  navigator.clipboard.writeText(text);
  console.log(text);
  alert("Copied!");
  }
</script>
<h1 style="text-align: center;">Your GeoVerify Code:</h1>
<body>
  <div id="code-container"><h1 style="text-align: center;" id="code"></h1></div>
  <button-container style="text-align: center">
<button onclick="copyCode()">
  <ion-icon name="copy-outline"></ion-icon>
  <span>Copy Code</span>
</button>
    </button-container>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

<script>
function generateCode() {
  return "gvcode-" + Math.floor(1000 + Math.random() * 9000);
}

const code = generateCode();
document.getElementById("code").innerText = code;
</script>
</html>
