<h1 style="text-align: center;">Your GeoVerify Code:</h1>
<body>
  <div><h1 style="text-align: center;" id="code"></h1></div>
<button onclick="copyCode()">
  <ion-icon name="copy-outline"></ion-icon>
  <span>Copy Code</span>
</button>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

<script>
function generateCode() {
  return "gvcode-" + Math.floor(1000 + Math.random() * 9000);
}

const code = generateCode();
document.getElementById("code").innerText = code;

// Save it so user can copy later
localStorage.setItem("verifyCode", code);
</script>
